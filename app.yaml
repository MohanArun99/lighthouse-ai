# Databricks App Configuration
# Lighthouse AI - Crisis Management & Risk Intelligence Platform

# App entry point - runs the FastAPI application
command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080"]

# Environment variables
env:
  - name: DEMO_MODE
    value: "true"
  - name: PORT
    value: "8080"

# Resources configuration
resources:
  - name: default
    description: Serverless compute for Lighthouse AI
    cpu: "1"
    memory: "2Gi"
